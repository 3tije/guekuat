<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>#GueKuat – Kuis Remaja</title>
<style>
:root{
  --ink:#0f172a;--muted:#64748b;--blue:#0ea5e9;--purple:#8b5cf6;--green:#22c55e;
  --card:rgba(255,255,255,.82);--line:rgba(15,23,42,.10);--shadow:0 22px 55px rgba(15,23,42,.14)
}
*{box-sizing:border-box}
body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:var(--ink);
background:radial-gradient(circle at 10% 0%,rgba(14,165,233,.33),transparent 30%),
radial-gradient(circle at 90% 8%,rgba(139,92,246,.32),transparent 32%),
linear-gradient(135deg,#e0f2fe,#f5f3ff 55%,#ecfdf5);min-height:100vh}
.wrap{max-width:880px;margin:auto;padding:16px}
.top{position:sticky;top:0;z-index:5;background:rgba(255,255,255,.72);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.topin{max-width:880px;margin:auto;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.brand{font-weight:950;display:flex;align-items:center;gap:8px}.brand span{font-size:22px}
.home{font-size:13px;font-weight:850;color:#334155;text-decoration:none;background:#fff;border:1px solid var(--line);padding:8px 12px;border-radius:999px}
.progressbox{margin:8px 0 2px}.ptext{display:flex;justify-content:space-between;font-size:13px;color:#475569;font-weight:850;margin-bottom:6px}
.track{height:10px;background:#dbeafe;border-radius:999px;overflow:hidden}.fill{height:100%;width:0;background:linear-gradient(90deg,var(--blue),var(--purple),var(--green));border-radius:999px;transition:.35s ease}
.card{background:var(--card);border:1px solid rgba(255,255,255,.78);box-shadow:var(--shadow);border-radius:28px;padding:20px;backdrop-filter:blur(10px);margin:16px 0}
.intro{text-align:center;padding:34px 20px}.logo{font-size:68px}.intro h1{font-size:44px;margin:8px 0 6px;letter-spacing:-1.5px}.intro p{color:#475569;font-size:17px;line-height:1.55}.btn{border:0;border-radius:999px;padding:14px 18px;font-weight:950;cursor:pointer;background:linear-gradient(135deg,var(--blue),var(--purple));color:white;box-shadow:0 16px 34px rgba(79,70,229,.25);font-size:15px}.btn.secondary{background:#fff;color:#172033;border:1px solid var(--line);box-shadow:none}.actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:16px}
.episode{display:none}.episode.active{display:block;animation:fade .35s ease both}@keyframes fade{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.scene{border-radius:24px;overflow:hidden;background:#fff;border:1px solid var(--line);margin-bottom:14px}.scene svg{width:100%;height:auto;display:block}
.tag{display:inline-flex;padding:6px 10px;border-radius:999px;background:#eef2ff;color:#4338ca;font-weight:950;font-size:12px;margin-bottom:10px}
h2{margin:0 0 8px;font-size:28px;letter-spacing:-.6px}.story{color:#475569;line-height:1.55;margin:0 0 14px}.question{font-size:20px;font-weight:950;margin:16px 0 10px}
.opts{display:grid;gap:10px}.opt{display:flex;gap:10px;align-items:flex-start;background:#fff;border:1px solid var(--line);border-radius:18px;padding:13px;cursor:pointer;transition:.18s}.opt:hover{transform:translateY(-2px);box-shadow:0 10px 24px rgba(15,23,42,.08)}.opt:has(input:checked){border-color:#7c3aed;background:#f5f3ff;box-shadow:0 0 0 3px rgba(124,58,237,.10)}input{accent-color:#7c3aed;margin-top:4px}
.saved{display:none;text-align:center;color:#16a34a;font-weight:950;margin-top:10px}.saved.show{display:block;animation:fade .25s ease both}
.result{display:none;text-align:center}.result.show{display:block;animation:fade .45s ease both}.score{font-size:70px;font-weight:1000;letter-spacing:-2px;background:linear-gradient(135deg,var(--blue),var(--purple),var(--green));-webkit-background-clip:text;background-clip:text;color:transparent;margin:4px 0}.level{display:inline-flex;gap:8px;align-items:center;background:#111827;color:white;border-radius:999px;padding:10px 16px;font-weight:950;margin:8px 0 16px}.bars{display:grid;gap:12px;text-align:left;margin-top:14px}.barrow{background:#fff;border:1px solid var(--line);border-radius:18px;padding:12px}.barrow b{display:flex;justify-content:space-between;margin-bottom:8px}.mini{height:10px;background:#e2e8f0;border-radius:999px;overflow:hidden}.mini i{display:block;height:100%;background:linear-gradient(90deg,var(--blue),var(--purple),var(--green));border-radius:999px}
.advice{text-align:left;color:#334155;background:#fff;border:1px solid var(--line);border-radius:18px;padding:14px;margin-top:14px}.advice ul{margin:8px 0 0 20px}
@media(max-width:560px){.intro h1{font-size:36px}h2{font-size:24px}.card{padding:16px;border-radius:24px}.score{font-size:56px}.topin{align-items:flex-start;flex-direction:column}}
</style>
</head>
<body>
<header class="top">
 <div class="topin">
  <div style="width:100%">
   <div style="display:flex;justify-content:space-between;gap:10px;align-items:center">
    <div class="brand"><span>🛡️</span>#GueKuat Remaja</div>
    <a class="home" href="index.html">Beranda</a>
   </div>
   <div class="progressbox">
    <div class="ptext"><span id="epText">Episode 0 dari 10</span><span id="pctText">0%</span></div>
    <div class="track"><div class="fill" id="progress"></div></div>
   </div>
  </div>
 </div>
</header>

<main class="wrap">
<section class="card intro" id="intro">
 <div class="logo">🛡️</div>
 <h1>#GueKuat</h1>
 <p>Kamu akan mengikuti <b>10 cerita singkat</b>. Tidak ada jawaban benar atau salah. Jawablah sesuai dirimu.</p>
 <div class="actions"><button class="btn" onclick="startQuiz()">SIAP MULAI</button></div>
</section>

<section id="quiz"></section>

<section class="card result" id="result"></section>
</main>

<script>
const SVG={
emote:`<svg viewBox="0 0 800 420"><rect width="800" height="420" rx="28" fill="#dbeafe"/><rect x="70" y="70" width="660" height="265" rx="30" fill="#fff"/><circle cx="310" cy="185" r="58" fill="#fbbf24"/><rect x="245" y="245" width="130" height="76" rx="32" fill="#38bdf8"/><path d="M287 180h2M333 180h2" stroke="#111827" stroke-width="13" stroke-linecap="round"/><path d="M287 215q23-18 50 0" stroke="#111827" stroke-width="8" fill="none" stroke-linecap="round"/><path d="M452 105h130a24 24 0 0 1 24 24v62a24 24 0 0 1-24 24h-52l-44 38v-38h-34a24 24 0 0 1-24-24v-62a24 24 0 0 1 24-24z" fill="#fee2e2" stroke="#ef4444" stroke-width="6"/><path d="M470 144h96M470 168h72" stroke="#991b1b" stroke-width="9" stroke-linecap="round"/><text x="400" y="380" text-anchor="middle" font-size="28" font-weight="900" fill="#334155">Saat Emosi Menguasai</text></svg>`,
task:`<svg viewBox="0 0 800 420"><rect width="800" height="420" rx="28" fill="#ede9fe"/><rect x="85" y="74" width="230" height="250" rx="24" fill="#fff" stroke="#8b5cf6" stroke-width="7"/><path d="M130 130h135M130 170h110M130 210h145M130 250h90" stroke="#64748b" stroke-width="12" stroke-linecap="round"/><circle cx="520" cy="165" r="58" fill="#fbbf24"/><rect x="448" y="227" width="145" height="82" rx="34" fill="#22c55e"/><path d="M605 105h80a20 20 0 0 1 20 20v54a20 20 0 0 1-20 20h-20l-32 30v-30h-28a20 20 0 0 1-20-20v-54a20 20 0 0 1 20-20z" fill="#fff" stroke="#0ea5e9" stroke-width="6"/><text x="645" y="160" text-anchor="middle" font-size="24" font-weight="900" fill="#0f172a">Yuk!</text><text x="400" y="380" text-anchor="middle" font-size="28" font-weight="900" fill="#334155">Pilihan di Persimpangan</text></svg>`,
phone:`<svg viewBox="0 0 800 420"><rect width="800" height="420" rx="28" fill="#cffafe"/><rect x="105" y="70" width="190" height="270" rx="32" fill="#111827"/><rect x="125" y="102" width="150" height="194" rx="14" fill="#67e8f9"/><text x="200" y="205" text-anchor="middle" font-size="40" font-weight="900" fill="#0f172a">01:30</text><circle cx="505" cy="180" r="62" fill="#fbbf24"/><rect x="430" y="245" width="150" height="80" rx="34" fill="#818cf8"/><path d="M480 180h1M530 180h1" stroke="#111827" stroke-width="12" stroke-linecap="round"/><path d="M480 216q25 18 52 0" stroke="#111827" stroke-width="8" fill="none" stroke-linecap="round"/><path d="M608 112l28-36M638 130l44-16" stroke="#f59e0b" stroke-width="10" stroke-linecap="round"/><text x="400" y="380" text-anchor="middle" font-size="28" font-weight="900" fill="#334155">Mengelola Tekanan</text></svg>`,
reject:`<svg viewBox="0 0 800 420"><rect width="800" height="420" rx="28" fill="#fee2e2"/><circle cx="310" cy="175" r="58" fill="#fbbf24"/><rect x="238" y="236" width="145" height="82" rx="34" fill="#0ea5e9"/><circle cx="515" cy="175" r="58" fill="#fca5a5"/><rect x="443" y="236" width="145" height="82" rx="34" fill="#64748b"/><path d="M392 100l-70 155" stroke="#ef4444" stroke-width="18" stroke-linecap="round"/><path d="M322 100l70 155" stroke="#ef4444" stroke-width="18" stroke-linecap="round"/><circle cx="630" cy="118" r="50" fill="#fff" stroke="#ef4444" stroke-width="12"/><path d="M600 88l60 60" stroke="#ef4444" stroke-width="12"/><text x="400" y="380" text-anchor="middle" font-size="28" font-weight="900" fill="#334155">Ajakan yang Menggoda</text></svg>`,
talk:`<svg viewBox="0 0 800 420"><rect width="800" height="420" rx="28" fill="#dcfce7"/><circle cx="275" cy="190" r="58" fill="#fbbf24"/><rect x="205" y="250" width="140" height="75" rx="32" fill="#22c55e"/><circle cx="520" cy="190" r="58" fill="#fde68a"/><rect x="450" y="250" width="140" height="75" rx="32" fill="#8b5cf6"/><path d="M340 92h150a24 24 0 0 1 24 24v62a24 24 0 0 1-24 24h-50l-38 34v-34h-62a24 24 0 0 1-24-24v-62a24 24 0 0 1 24-24z" fill="#fff" stroke="#16a34a" stroke-width="6"/><path d="M360 130h110M360 158h80" stroke="#64748b" stroke-width="10" stroke-linecap="round"/><text x="400" y="380" text-anchor="middle" font-size="28" font-weight="900" fill="#334155">Berani Bersuara</text></svg>`,
peer:`<svg viewBox="0 0 800 420"><rect width="800" height="420" rx="28" fill="#fef3c7"/><circle cx="400" cy="180" r="58" fill="#fbbf24"/><rect x="330" y="240" width="140" height="78" rx="34" fill="#0ea5e9"/><path d="M235 185h92" stroke="#ef4444" stroke-width="16" stroke-linecap="round"/><path d="M285 140l55 45-55 45" fill="none" stroke="#ef4444" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/><path d="M565 185h-92" stroke="#ef4444" stroke-width="16" stroke-linecap="round"/><path d="M515 140l-55 45 55 45" fill="none" stroke="#ef4444" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/><text x="400" y="380" text-anchor="middle" font-size="28" font-weight="900" fill="#334155">Tekanan Teman Sebaya</text></svg>`,
alone:`<svg viewBox="0 0 800 420"><rect width="800" height="420" rx="28" fill="#e0e7ff"/><circle cx="340" cy="190" r="58" fill="#fbbf24"/><rect x="270" y="250" width="140" height="76" rx="34" fill="#818cf8"/><path d="M316 190h1M365 190h1" stroke="#111827" stroke-width="12" stroke-linecap="round"/><path d="M315 226q25-18 52 0" stroke="#111827" stroke-width="8" fill="none" stroke-linecap="round"/><path d="M462 96h125a24 24 0 0 1 24 24v68a24 24 0 0 1-24 24h-52l-45 40v-40h-28a24 24 0 0 1-24-24v-68a24 24 0 0 1 24-24z" fill="#fff" stroke="#6366f1" stroke-width="6"/><text x="525" y="165" text-anchor="middle" font-size="42" font-weight="900" fill="#6366f1">?</text><text x="400" y="380" text-anchor="middle" font-size="28" font-weight="900" fill="#334155">Tidak Harus Sendiri</text></svg>`,
care:`<svg viewBox="0 0 800 420"><rect width="800" height="420" rx="28" fill="#fce7f3"/><circle cx="305" cy="185" r="58" fill="#fbbf24"/><circle cx="500" cy="185" r="58" fill="#fde68a"/><rect x="235" y="245" width="140" height="76" rx="34" fill="#3b82f6"/><rect x="430" y="245" width="140" height="76" rx="34" fill="#ec4899"/><path d="M375 165q30-35 70 0" stroke="#be185d" stroke-width="12" fill="none" stroke-linecap="round"/><path d="M280 215q25 18 52 0" stroke="#111827" stroke-width="8" fill="none" stroke-linecap="round"/><text x="400" y="380" text-anchor="middle" font-size="28" font-weight="900" fill="#334155">Peduli Itu Keren</text></svg>`,
help:`<svg viewBox="0 0 800 420"><rect width="800" height="420" rx="28" fill="#ccfbf1"/><circle cx="285" cy="185" r="55" fill="#fbbf24"/><circle cx="505" cy="185" r="55" fill="#fde68a"/><rect x="220" y="242" width="130" height="76" rx="32" fill="#14b8a6"/><rect x="440" y="242" width="130" height="76" rx="32" fill="#8b5cf6"/><rect x="335" y="105" width="130" height="92" rx="22" fill="#fff" stroke="#14b8a6" stroke-width="6"/><path d="M360 140h80M360 166h58" stroke="#64748b" stroke-width="10" stroke-linecap="round"/><text x="400" y="380" text-anchor="middle" font-size="28" font-weight="900" fill="#334155">Mencari Jalan Keluar</text></svg>`,
grow:`<svg viewBox="0 0 800 420"><rect width="800" height="420" rx="28" fill="#dcfce7"/><path d="M400 315V165" stroke="#16a34a" stroke-width="18" stroke-linecap="round"/><path d="M400 205c-70-80-150-50-170 25 78 20 130 2 170-25z" fill="#86efac"/><path d="M405 185c68-84 152-56 170 18-78 24-132 10-170-18z" fill="#4ade80"/><circle cx="400" cy="120" r="54" fill="#fbbf24"/><path d="M378 120h1M420 120h1" stroke="#111827" stroke-width="12" stroke-linecap="round"/><path d="M378 146q22 18 45 0" stroke="#111827" stroke-width="8" fill="none" stroke-linecap="round"/><text x="400" y="380" text-anchor="middle" font-size="28" font-weight="900" fill="#334155">Versi Terbaik Dirimu</text></svg>`
};

const ITEMS=[
{dim:"Self Regulation",svg:"emote",title:"Saat Emosi Menguasai",story:"Hari ini kamu terlambat masuk kelas. Guru menegurmu di depan teman-teman. Kamu merasa malu dan sangat kesal.",q:"Apa yang biasanya kamu lakukan?",opts:["Gue ngamuk aja","Gue diam tapi bete","Gue tarik napas, nenangin diri","Gue mikir positif dan lanjut aktivitas"]},
{dim:"Self Regulation",svg:"task",title:"Pilihan di Persimpangan",story:"Tugas sedang menumpuk. Tiba-tiba teman mengajak nongkrong dan kamu sebenarnya ingin ikut.",q:"Apa keputusanmu?",opts:["Gas nongkrong aja","Bagi dua, setengah nugas setengah nongkrong","Gue tolak halus","Fokus beresin dulu, baru nongkrong"]},
{dim:"Self Regulation",svg:"phone",title:"Mengelola Tekanan",story:"Kamu lagi stres. HP terus menyala, waktu sudah malam, dan besok masih ada aktivitas penting.",q:"Cara kamu mengatasinya biasanya...",opts:["Scroll medsos sampai lupa waktu","Main game nonstop","Olahraga / dengar musik","Cari solusi dan bikin rencana"]},
{dim:"Assertiveness",svg:"reject",title:"Ajakan yang Menggoda",story:"Di lingkungan pertemanan, ada yang mengajak mencoba rokok, miras, atau narkoba sambil bercanda agar kamu ikut.",q:"Apa responsmu?",opts:["Ikut aja biar nggak dicengin","Cari-cari alasan nolak","Bilang nggak nyaman","Tegas nolak, bilang berbahaya"]},
{dim:"Assertiveness",svg:"talk",title:"Berani Bersuara",story:"Saat diskusi kelompok, pendapatmu berbeda dengan teman lain. Kamu takut dianggap sok tahu.",q:"Apa yang kamu lakukan?",opts:["Gue diam aja","Gue iya-in padahal nggak setuju","Gue kasih tahu halus","Gue speak up jelas"]},
{dim:"Assertiveness",svg:"peer",title:"Tekanan Teman Sebaya",story:"Ada teman yang memaksa kamu ikut kegiatan yang menurutmu tidak sehat dan berisiko.",q:"Sikapmu biasanya...",opts:["Ikut aja daripada ribet","Kabur / ghosting","Nolak dengan alasan","Nolak tegas walau beda pendapat"]},
{dim:"Reaching Out",svg:"alone",title:"Tidak Harus Sendiri",story:"Kamu sedang down. Rasanya ingin menyendiri dan tidak ingin siapa pun tahu.",q:"Apa yang biasanya kamu lakukan?",opts:["Gue pendam sendiri","Curhat di medsos random","Cerita ke teman dekat","Cari bantuan ortu/guru/mentor"]},
{dim:"Reaching Out",svg:"care",title:"Peduli Itu Keren",story:"Kamu melihat temanmu murung beberapa hari. Ia terlihat tidak seperti biasanya.",q:"Apa responsmu?",opts:["Cuek aja","Cuma like story dia","Nyapa dikit / ngajak ngobrol","Beneran temenin dan dengerin"]},
{dim:"Reaching Out",svg:"help",title:"Mencari Jalan Keluar",story:"Ada masalah besar yang membuatmu bingung. Kamu tahu masalah ini tidak mudah diselesaikan sendiri.",q:"Apa pilihanmu?",opts:["Kabur / pura-pura nggak ada","Cuma curhat di status","Tanya saran ke teman","Cari solusi bareng orang terpercaya"]},
{dim:"Reaching Out",svg:"grow",title:"Versi Terbaik Dirimu",story:"Kamu ingin berkembang, punya teman positif, dan punya kegiatan yang membuat hidup lebih bermakna.",q:"Apa yang paling menggambarkan dirimu?",opts:["Jalanin aja apa adanya","Nunggu diajak orang","Ikut kegiatan positif kalau sempat","Aktif cari peluang dan belajar hal baru"]}
];

let idx=0, answers=Array(ITEMS.length).fill(null);

function render(){
 const root=document.getElementById("quiz"); root.innerHTML="";
 ITEMS.forEach((it,i)=>{
  const sec=document.createElement("section"); sec.className="card episode"; sec.id="ep"+i;
  sec.innerHTML=`<div class="scene">${SVG[it.svg]}</div><span class="tag">${it.dim}</span><h2>Episode ${i+1} — ${it.title}</h2>
  <p class="story">${it.story}</p><div class="question">${it.q}</div>
  <div class="opts">${it.opts.map((o,j)=>`<label class="opt"><input type="radio" name="q${i}" value="${j}"><span>${o}</span></label>`).join("")}</div>
  <div class="saved" id="saved${i}">✓ Jawaban tersimpan</div>
  <div class="actions"><button class="btn secondary" onclick="prev()" ${i===0?"style='display:none'":""}>← Kembali</button><button class="btn" onclick="next()">${i===ITEMS.length-1?"Lihat Hasil":"Lanjut →"}</button></div>`;
  root.appendChild(sec);
 });
 document.querySelectorAll("input[type=radio]").forEach(el=>el.addEventListener("change",e=>{
   const n=parseInt(e.target.name.replace("q","")); answers[n]=parseInt(e.target.value);
   document.getElementById("saved"+n).classList.add("show"); updateProgress();
 }));
}
function startQuiz(){document.getElementById("intro").style.display="none";idx=0;showEp();}
function showEp(){document.querySelectorAll(".episode").forEach(e=>e.classList.remove("active"));document.getElementById("ep"+idx).classList.add("active");updateProgress();window.scrollTo({top:0,behavior:"smooth"});}
function next(){if(answers[idx]===null){alert("Pilih jawaban dulu ya ✍️");return;} if(idx<ITEMS.length-1){idx++;showEp();}else showResult();}
function prev(){if(idx>0){idx--;showEp();}}
function updateProgress(){
 const answered=answers.filter(x=>x!==null).length; const pct=Math.round(answered/ITEMS.length*100);
 document.getElementById("progress").style.width=pct+"%"; document.getElementById("pctText").textContent=pct+"%";
 document.getElementById("epText").textContent=idx>=0 && document.getElementById("intro").style.display==="none" ? `Episode ${idx+1} dari ${ITEMS.length}` : `Episode 0 dari ${ITEMS.length}`;
}
function showResult(){
 document.getElementById("quiz").style.display="none";
 const total=answers.reduce((a,b)=>a+b,0), max=ITEMS.length*3, pct=Math.round(total/max*100);
 const dims={SR:{s:0,m:0,name:"Self Regulation"},A:{s:0,m:0,name:"Assertiveness"},RO:{s:0,m:0,name:"Reaching Out"}};
 ITEMS.forEach((it,i)=>{const key=it.dim==="Self Regulation"?"SR":it.dim==="Assertiveness"?"A":"RO";dims[key].s+=answers[i];dims[key].m+=3;});
 let label,level,emoji,saran;
 if(pct<=40){label="Butuh Penguatan";level="Level 1 — Benih Kuat";emoji="🌱";saran=["Latih jeda sebelum merespons emosi.","Cari satu orang terpercaya untuk diajak bicara.","Mulai berani berkata tidak dalam situasi kecil."];}
 else if(pct<=60){label="Cukup, Perlu Konsisten";level="Level 2 — Mulai Tangguh";emoji="🔵";saran=["Perkuat kebiasaan positif saat stres.","Latih kalimat penolakan yang singkat dan tegas.","Pilih lingkungan yang mendukung keputusan sehat."];}
 else if(pct<=82){label="Kuat";level="Level 3 — Pejuang Tangguh";emoji="🟢";saran=["Jaga konsistensi saat berada dalam tekanan teman.","Ajak teman lain ikut kegiatan positif.","Berani lapor dan mencari bantuan bila melihat risiko."];}
 else{label="Sangat Kuat";level="Level 4 — Guardian";emoji="🏆";saran=["Kamu bisa jadi teladan positif bagi teman.","Gunakan pengaruhmu untuk menguatkan yang rentan.","Ikut kegiatan kepemimpinan atau edukasi sebaya."];}
 const bar=k=>{const p=Math.round(dims[k].s/dims[k].m*100);return `<div class="barrow"><b><span>${dims[k].name}</span><span>${p}%</span></b><div class="mini"><i style="width:${p}%"></i></div></div>`}
 const result=document.getElementById("result"); result.classList.add("show");
 result.innerHTML=`<div style="font-size:54px">🎉</div><h2>Selamat, tes selesai.</h2><div class="score">${pct}%</div><div class="level">${emoji} ${level}</div><h2>${label}</h2>
 <div class="bars">${bar("SR")}${bar("A")}${bar("RO")}</div>
 <div class="advice"><b>Saran untuk kamu:</b><ul>${saran.map(x=>`<li>${x}</li>`).join("")}</ul></div>
 <div class="actions"><button class="btn" onclick="shareResult(${pct},'${label}')">Bagikan Hasil</button><button class="btn secondary" onclick="location.reload()">Ulangi Tes</button><a class="btn secondary" href="index.html">Kembali ke Beranda</a></div>`;
 document.getElementById("epText").textContent="Selesai"; document.getElementById("pctText").textContent="100%"; document.getElementById("progress").style.width="100%";
 window.scrollTo({top:0,behavior:"smooth"});
}
function shareResult(pct,label){
 const text=`Aku sudah cek ketahanan diri di #GueKuat. Hasilku: ${pct}% — ${label}. Yuk coba juga!`;
