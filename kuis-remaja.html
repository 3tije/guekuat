<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>#GueKuat – Kuis Remaja</title>
<style>
:root{
  --ink:#0f172a;--muted:#64748b;--blue:#0ea5e9;--purple:#8b5cf6;--green:#22c55e;
  --card:rgba(255,255,255,.82);--line:rgba(15,23,42,.10);--shadow:0 22px 55px rgba(15,23,42,.14)
}
*{box-sizing:border-box}
body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:var(--ink);
background:radial-gradient(circle at 10% 0%,rgba(14,165,233,.33),transparent 30%),
radial-gradient(circle at 90% 8%,rgba(139,92,246,.32),transparent 32%),
linear-gradient(135deg,#e0f2fe,#f5f3ff 55%,#ecfdf5);min-height:100vh}
.wrap{max-width:880px;margin:auto;padding:16px}
.top{position:sticky;top:0;z-index:5;background:rgba(255,255,255,.72);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.topin{max-width:880px;margin:auto;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.brand{font-weight:950;display:flex;align-items:center;gap:8px}.brand span{font-size:22px}
.home{font-size:13px;font-weight:850;color:#334155;text-decoration:none;background:#fff;border:1px solid var(--line);padding:8px 12px;border-radius:999px}
.progressbox{margin:8px 0 2px}.ptext{display:flex;justify-content:space-between;font-size:13px;color:#475569;font-weight:850;margin-bottom:6px}
.track{height:10px;background:#dbeafe;border-radius:999px;overflow:hidden}.fill{height:100%;width:0;background:linear-gradient(90deg,var(--blue),var(--purple),var(--green));border-radius:999px;transition:.35s ease}
.card{background:var(--card);border:1px solid rgba(255,255,255,.78);box-shadow:var(--shadow);border-radius:28px;padding:20px;backdrop-filter:blur(10px);margin:16px 0}
.intro{text-align:center;padding:34px 20px}.logo{font-size:68px}.intro h1{font-size:44px;margin:8px 0 6px;letter-spacing:-1.5px}.intro p{color:#475569;font-size:17px;line-height:1.55}.btn{border:0;border-radius:999px;padding:14px 18px;font-weight:950;cursor:pointer;background:linear-gradient(135deg,var(--blue),var(--purple));color:white;box-shadow:0 16px 34px rgba(79,70,229,.25);font-size:15px}.btn.secondary{background:#fff;color:#172033;border:1px solid var(--line);box-shadow:none}.actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:16px}
.episode{display:none}.episode.active{display:block;animation:fade .35s ease both}@keyframes fade{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.scene{border-radius:24px;overflow:hidden;background:#fff;border:1px solid var(--line);margin-bottom:14px}
.episode-img{width:100%;height:auto;display:block;border-radius:24px;object-fit:cover;animation:imgIn .38s ease both}
@keyframes imgIn{from{opacity:.15;transform:scale(.985)}to{opacity:1;transform:scale(1)}}
.tag{display:inline-flex;padding:6px 10px;border-radius:999px;background:#eef2ff;color:#4338ca;font-weight:950;font-size:12px;margin-bottom:10px}
h2{margin:0 0 8px;font-size:28px;letter-spacing:-.6px}.story{color:#475569;line-height:1.55;margin:0 0 14px}.question{font-size:20px;font-weight:950;margin:16px 0 10px}
.opts{display:grid;gap:10px}.opt{display:flex;gap:10px;align-items:flex-start;background:#fff;border:1px solid var(--line);border-radius:18px;padding:13px;cursor:pointer;transition:.18s}.opt:hover{transform:translateY(-2px);box-shadow:0 10px 24px rgba(15,23,42,.08)}.opt:has(input:checked){border-color:#7c3aed;background:#f5f3ff;box-shadow:0 0 0 3px rgba(124,58,237,.10)}input{accent-color:#7c3aed;margin-top:4px}
.saved{display:none;text-align:center;color:#16a34a;font-weight:950;margin-top:10px}.saved.show{display:block;animation:fade .25s ease both}
.result{display:none;text-align:center}.result.show{display:block;animation:fade .45s ease both}.score{font-size:70px;font-weight:1000;letter-spacing:-2px;background:linear-gradient(135deg,var(--blue),var(--purple),var(--green));-webkit-background-clip:text;background-clip:text;color:transparent;margin:4px 0}.level{display:inline-flex;gap:8px;align-items:center;background:#111827;color:white;border-radius:999px;padding:10px 16px;font-weight:950;margin:8px 0 16px}.bars{display:grid;gap:12px;text-align:left;margin-top:14px}.barrow{background:#fff;border:1px solid var(--line);border-radius:18px;padding:12px}.barrow b{display:flex;justify-content:space-between;margin-bottom:8px}.mini{height:10px;background:#e2e8f0;border-radius:999px;overflow:hidden}.mini i{display:block;height:100%;background:linear-gradient(90deg,var(--blue),var(--purple),var(--green));border-radius:999px}
.advice{text-align:left;color:#334155;background:#fff;border:1px solid var(--line);border-radius:18px;padding:14px;margin-top:14px}.advice ul{margin:8px 0 0 20px}
@media(max-width:560px){.intro h1{font-size:36px}h2{font-size:24px}.card{padding:16px;border-radius:24px}.score{font-size:56px}.topin{align-items:flex-start;flex-direction:column}}
</style>
</head>
<body>
<header class="top">
 <div class="topin">
  <div style="width:100%">
   <div style="display:flex;justify-content:space-between;gap:10px;align-items:center">
    <div class="brand"><span>🛡️</span>#GueKuat Remaja</div>
    <a class="home" href="index.html">Beranda</a>
   </div>
   <div class="progressbox">
    <div class="ptext"><span id="epText">Episode 0 dari 10</span><span id="pctText">0%</span></div>
    <div class="track"><div class="fill" id="progress"></div></div>
   </div>
  </div>
 </div>
</header>

<main class="wrap">
<section class="card intro" id="intro">
 <div class="logo">🛡️</div>
 <h1>#GueKuat</h1>
 <p>Kamu akan mengikuti <b>10 cerita singkat</b>. Tidak ada jawaban benar atau salah. Jawablah sesuai dirimu.</p>
 <div class="actions"><button class="btn" onclick="startQuiz()">SIAP MULAI</button></div>
</section>

<section id="quiz"></section>

<section class="card result" id="result"></section>
</main>

<script>
const ITEMS=[
{dim:"Self Regulation",image:"images/ep1.webp",title:"Saat Emosi Menguasai",story:"Hari ini kamu terlambat masuk kelas. Guru menegurmu di depan teman-teman. Kamu merasa malu dan sangat kesal.",q:"Apa yang biasanya kamu lakukan?",opts:["Gue ngamuk aja","Gue diam tapi bete","Gue tarik napas, nenangin diri","Gue mikir positif dan lanjut aktivitas"]},
{dim:"Self Regulation",image:"images/ep2.webp",title:"Pilihan di Persimpangan",story:"Tugas sedang menumpuk. Tiba-tiba teman mengajak nongkrong dan kamu sebenarnya ingin ikut.",q:"Apa keputusanmu?",opts:["Gas nongkrong aja","Bagi dua, setengah nugas setengah nongkrong","Gue tolak halus","Fokus beresin dulu, baru nongkrong"]},
{dim:"Self Regulation",image:"images/ep3.webp",title:"Mengelola Tekanan",story:"Kamu lagi stres. HP terus menyala, waktu sudah malam, dan besok masih ada aktivitas penting.",q:"Cara kamu mengatasinya biasanya...",opts:["Scroll medsos sampai lupa waktu","Main game nonstop","Olahraga / dengar musik","Cari solusi dan bikin rencana"]},
{dim:"Assertiveness",image:"images/ep4.webp",title:"Ajakan yang Menggoda",story:"Di lingkungan pertemanan, ada yang mengajak mencoba rokok, miras, atau narkoba sambil bercanda agar kamu ikut.",q:"Apa responsmu?",opts:["Ikut aja biar nggak dicengin","Cari-cari alasan nolak","Bilang nggak nyaman","Tegas nolak, bilang berbahaya"]},
{dim:"Assertiveness",image:"images/ep5.webp",title:"Berani Bersuara",story:"Saat diskusi kelompok, pendapatmu berbeda dengan teman lain. Kamu takut dianggap sok tahu.",q:"Apa yang kamu lakukan?",opts:["Gue diam aja","Gue iya-in padahal nggak setuju","Gue kasih tahu halus","Gue speak up jelas"]},
{dim:"Assertiveness",image:"images/ep6.webp",title:"Tekanan Teman Sebaya",story:"Ada teman yang memaksa kamu ikut kegiatan yang menurutmu tidak sehat dan berisiko.",q:"Sikapmu biasanya...",opts:["Ikut aja daripada ribet","Kabur / ghosting","Nolak dengan alasan","Nolak tegas walau beda pendapat"]},
{dim:"Reaching Out",image:"images/ep7.webp",title:"Tidak Harus Sendiri",story:"Kamu sedang down. Rasanya ingin menyendiri dan tidak ingin siapa pun tahu.",q:"Apa yang biasanya kamu lakukan?",opts:["Gue pendam sendiri","Curhat di medsos random","Cerita ke teman dekat","Cari bantuan ortu/guru/mentor"]},
{dim:"Reaching Out",image:"images/ep8.webp",title:"Peduli Itu Keren",story:"Kamu melihat temanmu murung beberapa hari. Ia terlihat tidak seperti biasanya.",q:"Apa responsmu?",opts:["Cuek aja","Cuma like story dia","Nyapa dikit / ngajak ngobrol","Beneran temenin dan dengerin"]},
{dim:"Reaching Out",image:"images/ep9.webp",title:"Mencari Jalan Keluar",story:"Ada masalah besar yang membuatmu bingung. Kamu tahu masalah ini tidak mudah diselesaikan sendiri.",q:"Apa pilihanmu?",opts:["Kabur / pura-pura nggak ada","Cuma curhat di status","Tanya saran ke teman","Cari solusi bareng orang terpercaya"]},
{dim:"Reaching Out",image:"images/ep10.webp",title:"Versi Terbaik Dirimu",story:"Kamu ingin berkembang, punya teman positif, dan punya kegiatan yang membuat hidup lebih bermakna.",q:"Apa yang paling menggambarkan dirimu?",opts:["Jalanin aja apa adanya","Nunggu diajak orang","Ikut kegiatan positif kalau sempat","Aktif cari peluang dan belajar hal baru"]}
];

let idx=0, answers=Array(ITEMS.length).fill(null);

function render(){
 const root=document.getElementById("quiz"); root.innerHTML="";
 ITEMS.forEach((it,i)=>{
  const sec=document.createElement("section"); sec.className="card episode"; sec.id="ep"+i;
  sec.innerHTML=`<div class="scene"><img class="episode-img" src="${it.image}" alt="Ilustrasi Episode ${i+1}" loading="lazy" onerror="this.style.display='none'; this.parentElement.innerHTML='<div style=&quot;padding:30px;text-align:center;color:#64748b;font-weight:800&quot;>Gambar episode belum ditemukan</div>';"></div><span class="tag">${it.dim}</span><h2>Episode ${i+1} — ${it.title}</h2>
  <p class="story">${it.story}</p><div class="question">${it.q}</div>
  <div class="opts">${it.opts.map((o,j)=>`<label class="opt"><input type="radio" name="q${i}" value="${j}"><span>${o}</span></label>`).join("")}</div>
  <div class="saved" id="saved${i}">✓ Jawaban tersimpan</div>
  <div class="actions"><button class="btn secondary" onclick="prev()" ${i===0?"style='display:none'":""}>← Kembali</button><button class="btn" onclick="next()">${i===ITEMS.length-1?"Lihat Hasil":"Lanjut →"}</button></div>`;
  root.appendChild(sec);
 });
 document.querySelectorAll("input[type=radio]").forEach(el=>el.addEventListener("change",e=>{
   const n=parseInt(e.target.name.replace("q","")); answers[n]=parseInt(e.target.value);
   document.getElementById("saved"+n).classList.add("show"); updateProgress();
 }));
}
function startQuiz(){document.getElementById("intro").style.display="none";idx=0;showEp();}
function showEp(){document.querySelectorAll(".episode").forEach(e=>e.classList.remove("active"));document.getElementById("ep"+idx).classList.add("active");updateProgress();window.scrollTo({top:0,behavior:"smooth"});}
function next(){if(answers[idx]===null){alert("Pilih jawaban dulu ya ✍️");return;} if(idx<ITEMS.length-1){idx++;showEp();}else showResult();}
function prev(){if(idx>0){idx--;showEp();}}
function updateProgress(){
 const answered=answers.filter(x=>x!==null).length; const pct=Math.round(answered/ITEMS.length*100);
 document.getElementById("progress").style.width=pct+"%"; document.getElementById("pctText").textContent=pct+"%";
 document.getElementById("epText").textContent=idx>=0 && document.getElementById("intro").style.display==="none" ? `Episode ${idx+1} dari ${ITEMS.length}` : `Episode 0 dari ${ITEMS.length}`;
}
function showResult(){
 document.getElementById("quiz").style.display="none";
 const total=answers.reduce((a,b)=>a+b,0), max=ITEMS.length*3, pct=Math.round(total/max*100);
 const dims={SR:{s:0,m:0,name:"Self Regulation"},A:{s:0,m:0,name:"Assertiveness"},RO:{s:0,m:0,name:"Reaching Out"}};
 ITEMS.forEach((it,i)=>{const key=it.dim==="Self Regulation"?"SR":it.dim==="Assertiveness"?"A":"RO";dims[key].s+=answers[i];dims[key].m+=3;});
 let label,level,emoji,saran;
 if(pct<=40){label="Butuh Penguatan";level="Level 1 — Benih Kuat";emoji="🌱";saran=["Latih jeda sebelum merespons emosi.","Cari satu orang terpercaya untuk diajak bicara.","Mulai berani berkata tidak dalam situasi kecil."];}
 else if(pct<=60){label="Cukup, Perlu Konsisten";level="Level 2 — Mulai Tangguh";emoji="🔵";saran=["Perkuat kebiasaan positif saat stres.","Latih kalimat penolakan yang singkat dan tegas.","Pilih lingkungan yang mendukung keputusan sehat."];}
 else if(pct<=82){label="Kuat";level="Level 3 — Pejuang Tangguh";emoji="🟢";saran=["Jaga konsistensi saat berada dalam tekanan teman.","Ajak teman lain ikut kegiatan positif.","Berani lapor dan mencari bantuan bila melihat risiko."];}
 else{label="Sangat Kuat";level="Level 4 — Guardian";emoji="🏆";saran=["Kamu bisa jadi teladan positif bagi teman.","Gunakan pengaruhmu untuk menguatkan yang rentan.","Ikut kegiatan kepemimpinan atau edukasi sebaya."];}
 const bar=k=>{const p=Math.round(dims[k].s/dims[k].m*100);return `<div class="barrow"><b><span>${dims[k].name}</span><span>${p}%</span></b><div class="mini"><i style="width:${p}%"></i></div></div>`}
 const result=document.getElementById("result"); result.classList.add("show");
 result.innerHTML=`<div style="font-size:54px">🎉</div><h2>Selamat, tes selesai.</h2><div class="score">${pct}%</div><div class="level">${emoji} ${level}</div><h2>${label}</h2>
 <div class="bars">${bar("SR")}${bar("A")}${bar("RO")}</div>
 <div class="advice"><b>Saran untuk kamu:</b><ul>${saran.map(x=>`<li>${x}</li>`).join("")}</ul></div>
 <div class="actions"><button class="btn" onclick="shareResult(${pct},'${label}')">Bagikan Hasil</button><button class="btn secondary" onclick="location.reload()">Ulangi Tes</button><a class="btn secondary" href="index.html">Kembali ke Beranda</a></div>`;
 document.getElementById("epText").textContent="Selesai"; document.getElementById("pctText").textContent="100%"; document.getElementById("progress").style.width="100%";
 window.scrollTo({top:0,behavior:"smooth"});
}
function shareResult(pct,label){
 const text=`Aku sudah cek ketahanan diri di #GueKuat. Hasilku: ${pct}% — ${label}. Yuk coba juga!`;
 if(navigator.share){navigator.share({title:"#GueKuat",text});}else{navigator.clipboard.writeText(text);alert("Teks hasil sudah disalin. Bisa ditempel ke WA/IG.");}
}
render();updateProgress();
</script>
</body>
</html>
