<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Twibbon Gue Kuat</title>
<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#eaf7ff;
  text-align:center;
  color:#123;
}
.wrap{
  max-width:520px;
  margin:auto;
  padding:20px;
}
canvas{
  width:100%;
  max-width:500px;
  border-radius:18px;
  box-shadow:0 10px 30px #0002;
  background:#fff;
}
button,input{
  margin:10px 0;
  padding:14px 18px;
  border:none;
  border-radius:12px;
  font-size:16px;
}
button{
  background:#006ee6;
  color:white;
  font-weight:bold;
}
input{
  background:white;
}
</style>
</head>
<body>

<div class="wrap">
  <h1>Twibbon Gue Kuat</h1>
  <p>Upload fotomu, lalu unduh hasilnya.</p>

  <input type="file" id="upload" accept="image/*">

  <canvas id="canvas" width="1080" height="1080"></canvas>

  <br>
  <button onclick="downloadTwibbon()">⬇️ Download Twibbon</button>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const frame = new Image();
frame.crossOrigin = "anonymous";
frame.src = "../assets/twibbon-umum.png";

let userImg = null;

function drawCoverImage(img, cx, cy, diameter){
  const r = diameter / 2;

  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.clip();

  const scale = Math.max(diameter / img.width, diameter / img.height);
  const w = img.width * scale;
  const h = img.height * scale;

  ctx.drawImage(img, cx - w/2, cy - h/2, w, h);
  ctx.restore();
}

function drawCanvas(){
  ctx.clearRect(0,0,1080,1080);
  ctx.fillStyle = "#ffffff";
  ctx.fillRect(0,0,1080,1080);

  if(userImg){
    drawCoverImage(userImg, 560, 500, 650);
  }

  ctx.drawImage(frame,0,0,1080,1080);
}

frame.onload = drawCanvas;

frame.onerror = function(){
  alert("File twibbon belum terbaca. Cek lokasi: assets/twibbon-umum.png");
};

document.getElementById("upload").addEventListener("change", function(e){
  const file = e.target.files[0];
  if(!file) return;

  const reader = new FileReader();
  reader.onload = function(event){
    userImg = new Image();
    userImg.onload = drawCanvas;
    userImg.src = event.target.result;
  };
  reader.readAsDataURL(file);
});

function downloadTwibbon(){
  const link = document.createElement("a");
  link.download = "twibbon-gue-kuat.png";
  link.href = canvas.toDataURL("image/png");
  link.click();
}
</script>

</body>
</html>
