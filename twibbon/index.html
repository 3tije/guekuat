<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Twibbon Gue Kuat</title>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#eaf7ff;
  text-align:center;
  color:#123;
}
.wrap{
  max-width:520px;
  margin:auto;
  padding:20px;
}
canvas{
  width:100%;
  max-width:500px;
  border-radius:18px;
  box-shadow:0 10px 30px #0002;
  background:white;
  touch-action:none;
}
input,button{
  margin:8px;
  padding:13px 18px;
  border-radius:12px;
  border:none;
  font-size:15px;
}
button{
  background:#0077ff;
  color:white;
  font-weight:bold;
}
.control{
  background:white;
  border-radius:16px;
  padding:12px;
  margin:12px 0;
}
label{
  font-weight:bold;
}
</style>
</head>

<body>
<div class="wrap">
  <h1>Twibbon Gue Kuat</h1>
  <p>Upload foto, geser, zoom, lalu unduh hasilnya.</p>

  <input type="file" id="upload" accept="image/*">

  <canvas id="canvas" width="1080" height="1080"></canvas>

  <div class="control">
    <label>Zoom Foto</label><br>
    <input type="range" id="zoom" min="0.4" max="3" step="0.01" value="1">
    <br>
    <button onclick="resetFoto()">Reset Foto</button>
    <button onclick="downloadTwibbon()">⬇️ Download</button>
  </div>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const upload = document.getElementById("upload");
const zoomSlider = document.getElementById("zoom");

const frame = new Image();
frame.src = "../assets/twibbon-umum.png";

let userImg = null;
let imgX = 540;
let imgY = 500;
let zoom = 1;
let dragging = false;
let lastX = 0;
let lastY = 0;

function drawCanvas(){
  ctx.clearRect(0,0,1080,1080);
  ctx.fillStyle = "#fff";
  ctx.fillRect(0,0,1080,1080);

  if(userImg){
    const base = Math.max(720 / userImg.width, 720 / userImg.height);
    const scale = base * zoom;
    const w = userImg.width * scale;
    const h = userImg.height * scale;

    ctx.drawImage(userImg, imgX - w/2, imgY - h/2, w, h);
  }

  ctx.drawImage(frame,0,0,1080,1080);
}

frame.onload = drawCanvas;

upload.addEventListener("change", e=>{
  const file = e.target.files[0];
  if(!file) return;

  const reader = new FileReader();
  reader.onload = ev=>{
    userImg = new Image();
    userImg.onload = ()=>{
      imgX = 540;
      imgY = 500;
      zoom = 1;
      zoomSlider.value = 1;
      drawCanvas();
    };
    userImg.src = ev.target.result;
  };
  reader.readAsDataURL(file);
});

zoomSlider.addEventListener("input", e=>{
  zoom = parseFloat(e.target.value);
  drawCanvas();
});

function getPos(e){
  const rect = canvas.getBoundingClientRect();
  const touch = e.touches ? e.touches[0] : e;
  return {
    x:(touch.clientX - rect.left) * (1080 / rect.width),
    y:(touch.clientY - rect.top) * (1080 / rect.height)
  };
}

canvas.addEventListener("mousedown", startDrag);
canvas.addEventListener("mousemove", drag);
canvas.addEventListener("mouseup", endDrag);
canvas.addEventListener("mouseleave", endDrag);

canvas.addEventListener("touchstart", startDrag);
canvas.addEventListener("touchmove", drag);
canvas.addEventListener("touchend", endDrag);

function startDrag(e){
  if(!userImg) return;
  e.preventDefault();
  dragging = true;
  const p = getPos(e);
  lastX = p.x;
  lastY = p.y;
}

function drag(e){
  if(!dragging || !userImg) return;
  e.preventDefault();

  const p = getPos(e);
  imgX += p.x - lastX;
  imgY += p.y - lastY;
  lastX = p.x;
  lastY = p.y;

  drawCanvas();
}

function endDrag(){
  dragging = false;
}

function resetFoto(){
  imgX = 540;
  imgY = 500;
  zoom = 1;
  zoomSlider.value = 1;
  drawCanvas();
}

function downloadTwibbon(){
  const link = document.createElement("a");
  link.download = "twibbon-gue-kuat.png";
  link.href = canvas.toDataURL("image/png");
  link.click();
}
</script>

</body>
</html>
